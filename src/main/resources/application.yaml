spring:
  application:
    name: askosite
  datasource:
    url: jdbc:postgresql://localhost:5432/ASKOSITE
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 200MB
logging:
  level:
    org.springframework.security: DEBUG
server:
  error:
    whitelabel:
      enabled: false

